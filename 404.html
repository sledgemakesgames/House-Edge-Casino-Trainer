<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table not found | Table Ready</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@view-transition { navigation: auto; }
:root{
  --felt:#0C0D10; --felt-dark:#08090B; --panel:#15171B;
  --brass:#D6A94B; --brass-bright:#F0C46B; --coral:#E15D45;
  --text:#EDEEF0; --text-muted:#8A8F98; --line:rgba(237,238,240,0.09);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--felt-dark);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px;width:100%;}
a{color:inherit;}
:focus-visible{outline:2px solid var(--brass-bright);outline-offset:3px;border-radius:4px;}

header.site{padding:26px 0 0;}
.wordmark{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;letter-spacing:-0.3px;display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
.wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--brass);box-shadow:0 0 10px 1px rgba(214,169,75,0.6);}

.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 0;text-align:center;}
.card{max-width:440px;}
.chip-motif{margin:0 auto 22px;width:88px;height:88px;position:relative;}
.chip-motif svg{width:100%;height:100%;}
.big-num{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:64px;letter-spacing:-2px;color:var(--coral);margin:0 0 8px;line-height:1;}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;margin:0 0 12px;letter-spacing:-0.4px;}
p{font-size:14.5px;color:var(--text-muted);line-height:1.6;margin:0 0 30px;}
.btn{font-family:'Inter',sans-serif;font-weight:600;font-size:14px;background:var(--brass);color:#20160A;border:none;border-radius:11px;padding:12px 22px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:background 160ms ease,transform 100ms ease;}
.btn:hover{background:var(--brass-bright);transform:translateY(-1px);}

footer{padding:24px 0 40px;border-top:1px solid var(--line);text-align:center;font-size:12px;color:var(--text-muted);}
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <a class="wordmark" href="/"><span class="dot"></span>Table Ready</a>
  </header>

  <div class="stage">
    <div class="card">
      <div class="chip-motif">
        <svg viewBox="0 0 88 88" fill="none">
          <circle cx="44" cy="44" r="40" fill="none" stroke="#8A8F98" stroke-width="2.5" stroke-dasharray="6 7"/>
          <path d="M30 32L58 56M58 32L30 56" stroke="#E15D45" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="big-num">404</p>
      <h1>This table doesn't exist.</h1>
      <p>Wrong seat, wrong floor, or the dealer never showed up. Whatever brought you here, there's nothing at this address.</p>
      <a class="btn" href="/">Back to the floor</a>
    </div>
  </div>

  <footer>© 2026 SledgeMakesGames. All rights reserved.</footer>
</div>
</body>
</html>
